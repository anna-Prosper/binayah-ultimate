name: CI

# Runs the checks Vercel does NOT run on deploy (typecheck, lint, unit tests).
# Vercel already runs `next build`, so CI focuses on the fast, deterministic
# gates that would otherwise only be caught by a human running them locally.
on:
  push:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
